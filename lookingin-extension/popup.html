:root {
  --bg: #080a0f;
  --card: #10141c;
  --card2: #161d28;
  --border: rgba(255,255,255,0.07);
  --green: #3ddc84;
  --red: #ff4e4e;
  --yellow: #ffc107;
  --muted: #5a6a7a;
  --text: #dde6f0;
  --serif: Georgia, 'Times New Roman', serif;
}

body {
  width: 320px;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}

/* ── HERO HIT ── */
.hero {
  padding: 1.2rem 1.2rem 1rem;
  border-bottom: 1px solid var(--border);
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,78,78,0.07) 0%, transparent 70%);
  position: relative;
}

.hero-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.logo-wrap { display: flex; align-items: center; gap: 0.45rem; }
.logo-name { font-size: 0.78rem; font-weight: 700; letter-spacing: -0.01em; }
.date-badge {
  font-size: 0.62rem; color: var(--muted);
  background: var(--card); border: 1px solid var(--border);
  padding: 0.18rem 0.5rem; border-radius: 10px;
}
.reset-btn {
  background: none; border: none; color: var(--muted);
  font-size: 0.65rem; cursor: pointer; padding: 0.2rem 0.4rem;
  border-radius: 6px; transition: color 0.15s; font-family: inherit;
}
.reset-btn:hover { color: var(--red); }

.hit-row {
  display: flex;
  align-items: flex-end;
  gap: 0.8rem;
}
.hit-number {
  font-size: 4.5rem;
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -0.04em;
  color: var(--red);
  font-family: var(--serif);
  text-shadow: 0 0 40px rgba(255,78,78,0.3);
}
.hit-label-wrap { padding-bottom: 0.4rem; }
.hit-label {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.hit-sub {
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 0.2rem;
}

/* Live pulse */
.live-dot {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--red);
  margin-top: 0.7rem;
}
.live-dot::before {
  content: '';
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--red);
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.3; transform:scale(1.6); }
}

/* ── TRACKER LIST ── */
.section-label {
  font-size: 0.58rem; font-weight: 800; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted);
  padding: 0.65rem 1rem 0.3rem;
}

.tracker-row {
  display: flex; align-items: center; gap: 0.65rem;
  padding: 0.5rem 1rem;
  transition: background 0.1s;
  cursor: default;
}
.tracker-row:hover { background: var(--card); }

.t-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.t-name { font-size: 0.8rem; font-weight: 700; flex: 1; }
.t-bar-wrap { width: 50px; flex-shrink: 0; }
.t-bar-track { height: 3px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
.t-bar-fill  { height: 100%; border-radius: 99px; transition: width 0.8s cubic-bezier(.22,1,.36,1); }
.t-count { font-size: 0.68rem; color: var(--muted); text-align: right; margin-top: 2px; }

/* ── RECENT ── */
.recent-row {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.38rem 1rem;
  border-top: 1px solid rgba(255,255,255,0.03);
}
.r-company {
  font-size: 0.7rem; font-weight: 700; color: var(--red);
  flex-shrink: 0; width: 65px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.r-page {
  font-size: 0.68rem; color: var(--muted); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.r-time { font-size: 0.6rem; color: var(--muted); flex-shrink: 0; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 0; }

/* ── FOOTER ── */
.footer {
  padding: 0.7rem 1rem;
  display: flex; gap: 0.5rem; align-items: center;
}
.report-btn {
  flex: 1; background: var(--green); color: #000;
  font-weight: 800; font-size: 0.75rem; border: none;
  border-radius: 20px; padding: 0.5rem 1rem;
  cursor: pointer; font-family: inherit;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.report-btn:hover  { opacity: 0.88; }
.report-btn:active { transform: scale(0.97); }

/* ── EMPTY STATE ── */
.empty {
  padding: 1.4rem 1rem 1rem;
  text-align: center;
}
.empty-icon { font-size: 2rem; margin-bottom: 0.6rem; }
.empty-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--green); }
.empty-body  { font-size: 0.74rem; color: var(--muted); line-height: 1.6; }

/* ── CURRENT PAGE BANNER ── */
.page-banner {
  display: none;
  align-items: center; gap: 0.5rem;
  background: rgba(255,78,78,0.07);
  border-bottom: 1px solid rgba(255,78,78,0.15);
  padding: 0.45rem 1rem;
  font-size: 0.7rem;
}
.page-banner.show { display: flex; }
.page-banner-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1.5s infinite; flex-shrink: 0; }
.page-banner-text { flex: 1; color: var(--muted); }
.page-banner-text strong { color: var(--red); }
